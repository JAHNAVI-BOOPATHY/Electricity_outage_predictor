<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <style>
        body {
            font-family: Arial;
            background: #0b1d3a;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            background: #112d5c;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #ffcc00;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>⚡ Prediction Result</h1>

    <h2>{{ prediction_text }}</h2>
    <p>{{ message }}</p>
    <p>Expected outages: {{ count }}</p>

    <a href="/">
        <button>🔙 Go Back</button>
    </a>
</div>

</body>
</html>
